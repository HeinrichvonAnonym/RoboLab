syntax = "proto3";

package franka;

message JointState {
  double position = 1;
  double velocity = 2;
  double effort = 3;
}

message JointCommand {
  double position = 1;
  double velocity = 2;
  double effort = 3;
}

message JointStateArray {
  repeated JointState states = 1;
}

message Point{
  double x = 1;
  double y = 2;
  double z = 3;
}

message Quatenion{
  double w = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message Pose {
  Point pos = 1;
  Quatenion rot = 2;
}

/// Wire format for Zenoh topic payloads (e.g. robot/command).
message RobotCommand {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_DEMO = 1;
    TYPE_JOINT_TARGET = 2;
  }
  Type type = 1;
  uint32 sequence = 2;
  string mode = 3;
  string note = 4;
  repeated JointCommand joints = 5;
  float sys_time = 6;
}

message RobotObservation{
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_DEMO = 1;
    TYPE_JOINT_TARGET = 2;
  }
  Type type = 1;
  uint32 sequence = 2;
  string mode = 3;
  string note = 4;
  repeated JointCommand joints = 5;
  float sys_time = 6;
}

message StampedPose{
  Pose pose = 1;
  float sys_time = 2;
}
